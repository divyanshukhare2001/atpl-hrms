<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style/forget-password.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
            <link rel="stylesheet" href="./style/bg-animation.css">
  </head>
  <body>
    <!--background-video-->
    <!-- <video class="login-bg-video" autoplay muted loop>
      <source src="./assets/login-page/hrms-test-video.mp4" type="video/webm" />
    </video> -->

      <canvas id="bg"></canvas>
    
    <!--main-card-->
    <div class="card-wrap">
      <!--right-part-->
      <div class="login-box">
        <div class="slider-logo">
          <div class="logo-icon">
            <img
              src="./assets/login-page/abhilogo.png"
              width="100%"
              style="border-radius: 10px"
            />
          </div>
          <span class="logo-name">Abhi<span>Connect</span></span>
        </div>

        <div class="progress-bar-wrpr">
          <div class="step completed">
            <div class="circle">
              <i
                class="fa-solid fa-check"
                style="color: rgb(255, 255, 255)"
              ></i>
            </div>
            <span class="label">Identify</span>
          </div>

          <div class="step active">
            <div class="circle">
              <i
                class="fa-solid fa-check"
                style="color: rgb(255, 255, 255)"
              ></i>
            </div>
            <span class="label">Verify</span>
          </div>

          <div class="step">
            <div class="circle">
              <i
                class="fa-solid fa-check"
                style="color: rgb(255, 255, 255)"
              ></i>
            </div>
            <span class="label">OTP</span>
          </div>

          <div class="step">
            <div class="circle">
              <i
                class="fa-solid fa-check"
                style="color: rgb(255, 255, 255)"
              ></i>
            </div>
            <span class="label">Reset</span>
          </div>
        </div>

        <div class="forgot-header-wrpr">
          <h1>Forgot Password</h1>
        </div>

        <form id="forgot-step" action="">
          <div class="form-step" id="step-1">
            <p class="step-header">
              Enter your Employee ID to recover your account
            </p>
            <div class="field">
              <label>Employee ID</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <i class="fa-regular fa-address-card"></i>
                </span>
                <input type="text" id="empID" placeholder="EMP001" />
              </div>
            </div>
          </div>
          <div class="form-step" id="step-2">
            <p class="step-header">Choose a verification method to continue</p>
            <div class="field">
              <label>Choose verification method</label>
              <div class="input-wrap-radio">
                <input
                  type="radio"
                  id="phone"
                  name="contact_method"
                  value="phone_value"
                  checked
                />

                <label for="phone">
                  <i class="fa-solid fa-mobile-screen-button"></i>
                  <span>Phone OTP (********8421)</span>
                </label>
              </div>
              <div class="input-wrap-radio">
                <input
                  type="radio"
                  id="email"
                  name="contact_method"
                  value="email_value"
                />

                <label for="email">
                  <i class="fa-solid fa-mobile-screen-button"></i>
                  <span>Email OTP (di****@gmail.com)</span>
                </label>
              </div>
            </div>
          </div>

          <div class="form-step" id="step-3">
            <p class="step-header">
              Enter the 6-digit OTP sent to your <span>mobile number</span>
            </p>
            <span class="address">+91 98******97</span>
            <div class="otp-group">
              <input type="text" id="otp-1" maxlength="1" />
              <input type="text" id="otp-2" maxlength="1" />
              <input type="text" id="otp-3" maxlength="1" />
              <input type="text" id="otp-4" maxlength="1" />
              <input type="text" id="otp-5" maxlength="1" />
              <input type="text" id="otp-6" maxlength="1" />
            </div>

            <div class="otp-footer">
              <span class="otp-text">Didn't receive the OTP?</span>

              <button type="button" class="resend-btn" disabled>
                Resend OTP
              </button>

              <span class="otp-timer">(00:30)</span>
            </div>
          </div>
          <div class="form-step" id="step-4">
            <p class="step-header">Set a new password for your account</p>
            <div class="field">
              <label>New Password</label>
              <div class="input-wrap new">
                <span class="input-icon">
                  <i class="fa-solid fa-lock"></i>
                </span>
                <input
                  type="password"
                  id="new-pw"
                  placeholder="Enter your password"
                />
                <button class="toggle-pw" type="button">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>
            <span class="pw-feedback"></span>
            <div class="field">
              <label>Confirm Password</label>
              <div class="input-wrap confirm">
                <span class="input-icon">
                  <i class="fa-solid fa-lock"></i>
                </span>
                <input
                  type="password"
                  id="confirm-pw"
                  placeholder="Enter your password"
                />
                <button class="toggle-pw" type="button">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>
          </div>
        </form>

        <div class="btn-wrpr">
          <button class="back">Back</button>
          <button class="continue">Continue</button>
        </div>
        <a href="./index.html" class="toBack">Back to sign-in</a>
      </div>
    </div>

    <script src="./script/forget-pw.js"></script>
  </body>
</html>
